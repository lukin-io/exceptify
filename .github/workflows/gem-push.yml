name: Ruby Gem

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Test + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby from .ruby-version
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test

      - name: Run StandardRB
        run: bundle exec standardrb

      - name: Build gem
        run: bundle exec rake build

      - name: Verify tag matches gem version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="$(ruby -Ilib -rexceptify/version -e 'puts Exceptify::VERSION')"
          expected_ref="refs/tags/v${version}"

          if [ "${GITHUB_REF}" != "${expected_ref}" ]; then
            echo "Tag ${GITHUB_REF} does not match gem version ${version}; expected ${expected_ref}."
            exit 1
          fi

  publish:
    name: Publish
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby from .ruby-version
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Build gem
        run: bundle exec rake build

      - name: Publish to GitHub Packages
        run: |
          version="$(ruby -Ilib -rexceptify/version -e 'puts Exceptify::VERSION')"
          gem_path="pkg/exceptify-${version}.gem"

          mkdir -p "${HOME}/.gem"
          touch "${HOME}/.gem/credentials"
          chmod 0600 "${HOME}/.gem/credentials"
          printf -- "---\n:github: ${GEM_HOST_API_KEY}\n" > "${HOME}/.gem/credentials"

          gem push --key github --host "https://rubygems.pkg.github.com/${OWNER}" "${gem_path}"
        env:
          GEM_HOST_API_KEY: "Bearer ${{ secrets.GITHUB_TOKEN }}"
          OWNER: ${{ github.repository_owner }}

      - name: Publish to RubyGems
        run: |
          version="$(ruby -Ilib -rexceptify/version -e 'puts Exceptify::VERSION')"
          gem_path="pkg/exceptify-${version}.gem"

          mkdir -p "${HOME}/.gem"
          touch "${HOME}/.gem/credentials"
          chmod 0600 "${HOME}/.gem/credentials"
          printf -- "---\n:rubygems_api_key: ${GEM_HOST_API_KEY}\n" > "${HOME}/.gem/credentials"

          gem push "${gem_path}"
        env:
          GEM_HOST_API_KEY: "${{ secrets.RUBYGEMS_AUTH_TOKEN }}"
